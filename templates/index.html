<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Insight</title>
    <link rel="stylesheet" href="../static/css/style.css" />
    <style>
      .spinner-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #008080;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: relative;
        margin: 0 auto;
      }

      .spinner-text {
        position: relative;
        margin-top: 20px;
        color: #008080;
        font-size: 1.2em;
        font-weight: bold;
        text-align: center;
        width: 100%;
        max-width: 300px;
        padding: 0 20px;
      }

      @media screen and (max-width: 768px) {
        .spinner-container {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: rgba(255, 255, 255, 0.95);
        }

        .spinner {
          width: 40px;
          height: 40px;
          border-width: 4px;
        }

        .spinner-text {
          font-size: 1em;
          margin-top: 15px;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Chat Insight</h1>
      <p>
        Transform your WhatsApp conversations into beautiful visualizations and
        meaningful insights with just one click.
      </p>
      <form
        action="/upload"
        method="post"
        enctype="multipart/form-data"
        id="uploadForm"
      >
        <div class="upload-container">
          <input
            type="file"
            name="file"
            accept=".zip"
            required
            title="Select WhatsApp chat export ZIP file"
          />
          <button type="submit">Upload and Analyze</button>
        </div>
      </form>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
    </div>

    <div class="spinner-container" id="spinnerContainer">
      <div class="spinner"></div>
      <div class="spinner-text">Analyzing your chat data...</div>
    </div>

    <footer
      style="
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: #008080;
        color: white;
        text-align: center;
        padding: 10px 0;
        font-size: 0.8em;
      "
    >
      <p style="margin: 0; color: white">
        Made with ❤️ by Google Jr & Thabhelo |
        <a
          href="https://github.com/xeroxzen/chat-insight"
          style="color: white; text-decoration: underline"
          target="_blank"
          rel="noopener"
        >
          Open Source on GitHub
        </a>
      </p>
    </footer>

    <script>
      const spinnerContainer = document.getElementById("spinnerContainer");
      let spinnerTimeout;

      function showSpinner() {
        spinnerContainer.style.display = "flex";
        // Set a fallback timeout to hide spinner after 30 seconds
        spinnerTimeout = setTimeout(() => {
          hideSpinner();
        }, 30000);
      }

      function hideSpinner() {
        if (spinnerTimeout) {
          clearTimeout(spinnerTimeout);
        }
        spinnerContainer.style.display = "none";
      }

      document
        .getElementById("uploadForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          showSpinner();
          // Submit the form after showing spinner
          this.submit();
        });
    </script>
  </body>
</html>
